<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="catBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e91e63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9c27b0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#catBgGrad)"/>
  
  <!-- Pattern overlay -->
  <pattern id="catDots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="2" fill="rgba(255,255,255,0.1)"/>
  </pattern>
  <rect width="400" height="400" fill="url(#catDots)"/>
  
  <!-- Shopping bag icon -->
  <g transform="translate(200, 180)" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-50,-30 L-60,60 L60,60 L50,-30 Z"/>
    <path d="M-30,-30 Q-30,-70 0,-70 Q30,-70 30,-30"/>
    <circle cx="-30" cy="-30" r="5" fill="rgba(255,255,255,0.6)"/>
    <circle cx="30" cy="-30" r="5" fill="rgba(255,255,255,0.6)"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="290" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-weight="600">
    Categoría
  </text>
</svg>
