<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e91e63;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#9c27b0;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  
  <!-- Pattern -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#d0d0d0"/>
  </pattern>
  <rect width="400" height="400" fill="url(#dots)" opacity="0.5"/>
  
  <!-- Hanger icon -->
  <g transform="translate(200, 180)" fill="none" stroke="url(#iconGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Hook -->
    <path d="M0,-60 Q0,-80 15,-80 Q30,-80 30,-65 Q30,-50 15,-50"/>
    <!-- Hanger body -->
    <path d="M0,-50 L-80,20 L80,20 Z"/>
    <!-- Details -->
    <line x1="-60" y1="20" x2="-60" y2="60"/>
    <line x1="60" y1="20" x2="60" y2="60"/>
    <line x1="-60" y1="60" x2="60" y2="60"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#9e9e9e" text-anchor="middle" font-weight="500">
    Imagen no disponible
  </text>
  
  <!-- Brand -->
  <text x="200" y="330" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#bdbdbd" text-anchor="middle" letter-spacing="2">
    NEO ÁGORA
  </text>
</svg>
